  - type: Features
    data:
      - Upscaler — AI image upscaler that hallucinates believable new
        detail at higher resolutions (the original Magnific product).
      - Relight — re-lights any image with AI, driven by text prompts,
        reference images, or 3D lighting setups.
      - Structure — generates new images that respect the composition of
        a sketch, edge map, or reference image.
      - Style Transfer — transfers the visual style of one image onto
        another while preserving structure.
      - Mystic — Magnific's text-to-image generation model focused on
        photographic realism and creative control.
      - Fluffy — character consistency model for keeping subjects
        recognizable across multiple generations.
      - Creativity, HDR, and Resemblance sliders for fine-grained
        control over upscaling output.
      - Web application with credit-based pricing tiers; no public
        developer API for Magnific itself.
      - Freepik integration — Magnific capabilities are accessible
        through Freepik's broader AI creative suite following the 2024
        acquisition.
