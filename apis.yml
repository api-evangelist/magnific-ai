aid: magnific-ai
name: Magnific
description: >-
  Magnific is a Spanish AI image enhancement startup, founded in 2023 by
  Javi Lopez and Emilio Nicolas, best known for its AI image upscaler and
  enhancer that hallucinates believable new detail at higher resolutions.
  The product line expanded from the original Upscaler into Relight
  (AI-driven scene relighting), Structure (compose-from-sketch), Style
  Transfer, Mystic (text-to-image), and Fluffy (consistent characters).
  Magnific was acquired by Freepik in May 2024 and continues to operate
  under the Magnific brand while powering Freepik's image enhancement
  surface. There is no publicly documented developer API for Magnific
  itself; access is via the web application at magnific.ai (now
  magnific.com) and through the Freepik AI suite, where related image
  generation and upscaling capabilities are exposed via the Freepik API.
  Customer support is handled through an Intercom-backed help center and
  the founders maintain a high-visibility presence on X/Twitter.
